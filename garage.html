<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>PLAYFORGE GARAGE</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #9ec4e4; }
  canvas { width: 100%; height: 100%; display: block; touch-action: none; }
  #hud { position: fixed; left: 12px; top: 10px; color: #fff; font: 13px/1.5 system-ui, sans-serif;
         user-select: none; pointer-events: none; text-shadow: 0 1px 3px rgba(0,0,0,.6); }
  #hud b { color: #ffd75e; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud"><b>PLAYFORGE GARAGE</b> — textured vehicle framework<br>
click to look · WASD move · <b>E</b> enter/exit · <b>O</b> open panels · 1-6 doors/hood/trunk · <b>C</b> paint · <b>L</b> lights · Space handbrake<br>
<span id="stats"></span></div>
<script type="module" src="/demo/garage.js"></script>
</body>
</html>
