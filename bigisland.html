<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>PLAYFORGE — BIG ISLAND</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #8fb9dc; }
  canvas { width: 100%; height: 100%; display: block; touch-action: none; }
  #hud { position: fixed; left: 12px; top: 10px; color: #fff; font: 13px/1.5 system-ui, sans-serif;
         user-select: none; pointer-events: none; text-shadow: 0 1px 3px rgba(0,0,0,.6); }
  #hud b { color: #ffd75e; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud"><b>PLAYFORGE — BIG ISLAND</b> — seed <span id="seed">?</span><br>
click to look · WASD move · Shift run · <b>E</b> car · Space jump/handbrake · <b>R</b> new world<br>
<span id="stats"></span></div>
<script type="module" src="/demo/bigisland.js"></script>
</body>
</html>
