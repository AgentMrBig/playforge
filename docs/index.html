<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>PLAYFORGE — Big Island</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #8fb9dc; }
  canvas { width: 100%; height: 100%; display: block; touch-action: none; }
  #hud { position: fixed; left: 12px; top: 10px; color: #fff; font: 13px/1.5 system-ui, sans-serif;
         user-select: none; pointer-events: none; text-shadow: 0 1px 3px rgba(0,0,0,.6); }
  #hud b { color: #ffd75e; }
  /* loading screen (Ember): holds the reveal until the world is built so no
     assets pop in front of the player. Shown instantly; faded by loadingscreen.js */
  #pf-loading { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 22px;
    background: radial-gradient(120% 120% at 50% 30%, #223049 0%, #0c1018 70%);
    color: #e8eefc; font: 15px/1.5 system-ui, sans-serif; transition: opacity .6s ease; }
  #pf-loading.pf-hide { opacity: 0; pointer-events: none; }
  #pf-loading .pf-title { font-size: clamp(34px, 8vw, 68px); font-weight: 800; letter-spacing: .12em;
    color: #ffd75e; text-shadow: 0 2px 24px rgba(255,215,94,.35); }
  #pf-loading .pf-sub { opacity: .7; letter-spacing: .04em; }
  #pf-loading .pf-bar { width: min(360px, 70vw); height: 4px; border-radius: 4px; overflow: hidden;
    background: rgba(255,255,255,.12); }
  #pf-loading .pf-fill { height: 100%; width: 35%; border-radius: 4px;
    background: linear-gradient(90deg, #ffd75e, #ff8a3c); animation: pf-slide 1.1s ease-in-out infinite; }
  @keyframes pf-slide { 0% { margin-left: -35%; } 100% { margin-left: 100%; } }
</style>
  <script type="module" crossorigin src="./assets/main-BoPr4HYm.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/streamworld-CFMq7AIf.js">
  <link rel="modulepreload" crossorigin href="./assets/character-DsRiylU0.js">
  <link rel="modulepreload" crossorigin href="./assets/noise-CFAVajEv.js">
</head>
<body>
<div id="pf-loading">
  <div class="pf-title">PLAYFORGE</div>
  <div class="pf-bar"><div class="pf-fill"></div></div>
  <div class="pf-sub" id="pf-loading-msg">Building the island…</div>
</div>
<canvas id="game"></canvas>
<div id="hud"><b>PLAYFORGE</b> — Big Island · seed <span id="seed"></span><br>
click to look · WASD move · <b>E</b> enter/exit car · Shift run · Space jump/handbrake · <b>F</b> recover car · <b>O</b> panels · <b>C</b> paint · <b>L</b> lights · <b>R</b> new island<br>
<span id="stats"></span></div>
</body>
</html>
