<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>PlayForge — demo</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #10131a; }
  canvas { width: 100%; height: 100%; display: block; touch-action: none; }
  #hud { position: fixed; left: 12px; top: 10px; color: #9fb0c8; font: 13px/1.5 system-ui, sans-serif;
         user-select: none; pointer-events: none; text-shadow: 0 1px 2px #000; }
  #hud b { color: #ffd75e; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud"><b>PLAYFORGE</b> demo — WASD move · Space jump · drag orbit · right-drag pan · wheel zoom<br>
Collect the gold cubes. <span id="score">0</span> collected.</div>
<script type="module" src="/demo/main.js"></script>
</body>
</html>
